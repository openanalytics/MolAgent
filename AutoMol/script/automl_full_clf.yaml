###################################################################################
#                              Data arguments
# data file
file_name: '../Data/ChEMBL_SMILES.csv'
# separator used in data file
sep: ','
# smiles column in data file
smiles_column: 'smiles'
# set for more output
verbose: True
###################################################################################
#                              Property arguments
# check rdkit descriptors (for use of rdkit features) 
check_rdkit_desc: False
# string with standardization
categorical: False
# list of Properties
properties: ['prop1','prop2']
# list of number of classes for classification
nb_classes: [2,3]
# list of number of class thresholds for classification
class_values: [[1],[1,3]]
# list of number of class quantiles for classification
class_quantiles: null # [[0.3],[0.2,0.4]]
# minimum number of allowed samples in a class
min_allowed_class_samples: 30
###################################################################################
#                              Training arguments
#task ['Regression','Classification','RegressionClassification']
task: 'Classification'
#scorer used for optimizating parameters
scorer: 'balanced_accuracy'
# transform target data with log10 before training
use_log10: False
# divide target data by 100 
percentages: False
# transform data using logit
use_logit: False
#apply sample weights
use_sample_weight: True
#use user provided samples weights
use_provided_sample_weight: False
# provide index for samples weights
weighted_samples_index: 
    prop1: 0
    prop2: 1
# provide weights for weighted samples (1.0 used for non weighted samples)
select_sample_weights:
    prop1: 10
    prop2: 100
#random state for optimization
random_state: 5
# list of random states
random_state_list: [1,7,42,55,3]
# thread dictionary        
n_jobs_dict:
    outer_jobs: 1
    inner_jobs: -1
    method_jobs: 2
# search_type
search_type: 'hyperopt'
#number of iterations used
randomized_iterations: 100
###################################################################################
#                              Model complexity arguments
# computational load ['cheap','moderate','expensive']
computional_load: 'cheap'
# underlying hierarchy
model_config: 'top_method'
# boolean to use distributions
use_distributions: True
# list of method keys
blender_list: ['lr','lgbm']
# list of base estimator keys
base_list: ['lgbm','lr','SVC']
# list of used feature per property
used_features: [ ['Bottleneck'], ['Bottleneck','fps_2048_3'] ]
# list of dimensionality reduction keys
red_dim_list: ['passthrough']
# list of dimensionality reduction keys for each property
red_dim_list_per_prop: [['passthrough'],[['passthrough'],['passthrough','pca','SelectPercentile','v_threshold','Kbest']]]      
# boolean to use featuretypewise dim. red. methods
local_dim_red: True
# set max number of components, leaving it out means None
dim_red_n_components: [5,10,25,50,100,250]    
# normalize data before base estimators
normalizer: True
# normalize data before top/final estimator/blender
top_normalizer: False
###################################################################################
#                              Validation set arguments
# algorithm used for clustering data when creating validation set
val_clustering: 'Bottleneck'
# value of k for kmeans
val_km_groups: 30 
# include chirality for validation set (murckoscaffold)
val_include_chirality: False
# value for butina cutoff, list for hierarchical
val_butina_cutoff: [0.4]
# validation set strategy (mixed,stratified or leave_group_out)
strategy: 'mixed'
# fraction that is used as validation set
test_size: 0.25
# threshold of samples in a cluster to consider the cluster as minority
minority_nb: 5     
# threshold for tanimoto distance cluster compounds for property cliff calculation
prop_cliff_butina_th: 0.45
# relative value to determine what is considered property cliff. two compounds i,j are considered property cliff if abs(pi-pj)> rel_prop_cliff * range(property) with range(property)= max(prop) - min(prop)
rel_prop_cliff: 0.5
# dictionary wth relative values that set upto how much samples are represented in the validation of each type
mix_coef_dict:
    prop_cliffs: 0.3
    leave_group_out: 0.3
    stratified: 0.4
###################################################################################
#                              Nested Cross-validation arguments
# clustering algorithm used for nested cross-validation (NCV)
cv_clustering: 'Bottleneck'
# value of k for kmeans++ in NCV
km_groups: 30
# include chiralty for murcko scaffold for NCV
include_chirality: False
# butiona theshold(s) for NCV
butina_cutoff: [0.2,0.4,0.6]
# nested cross-valdiation split
cross_val_split: 'GKF'
# number of outer folds, with inner folds this value -1 
outer_folds: 4
###################################################################################
#                              Pdf arguments
#colormaps for classification
cmap: ['PiYG','Blues']
# revert predicted value to original after transformation
revert_to_original: False
# indicate for regression which values below a certain threshold are considered 'positive'
positive_cls: "<"
# revert axis labels on scatterplots to original values, without changing predicted point values
apply_tick_transformation: False
# provide list per property of class cutoffs to turn regressor in classifier (transformed value!)
# width of figures
x_width: 600
# height of figures
y_height: 450
# file containing the pdf
output_file: "summary.pdf"
# title of the pdf
title: 'AutoMoL report Title'
# authors of the pdf
authors: 'Joris Tavernier'
#emails of the pdf, sends the e-mail
mails: 'joris.tavernier@openanalytics.eu'
# project details
summary: 'Project details'
# select figure types (see notebooks or app), use null for defaults
figure_types: null
# set number of columns
nb_columns: 3
# save model in
save_model_to_file: 'automol_model.pt'
